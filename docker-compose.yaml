version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: diagram_app_db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: diagram_app
      PGUSER: root
      PGPASSWORD: root
      PGDATABASE: diagram_app
    volumes:
      - diagram_app_db-data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: diagram_app_backend
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://root:root@db:5432/diagram_app

  frontend:
    build: ./frontend
    container_name: diagram_app_frontend
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: diagram_app_nginx
    depends_on:
      - frontend
      - backend
    ports:
      - "80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  diagram_app_db-data:

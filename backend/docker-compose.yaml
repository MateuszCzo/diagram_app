version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: diagram_app_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: diagram_app
    volumes:
      - diagram_app_db-data:/var/lib/postgresql/data
    ports:
      - "5432"

  backend:
    build: .
    container_name: diagram_app_backend
    depends_on:
      - db
    ports:
      - "8000"

volumes:
  diagram_app_db-data: